name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Dependabot PRs run with NO Actions secrets (GitHub policy) — the VITE_*
    # fallbacks below let the full verify chain (lint + tsc + tests + build)
    # still run meaningfully on dependency bumps: unit tests never touch real
    # Firebase, and the build only inlines the strings. The deploy step is
    # skipped for Dependabot (no Cloudflare token) — a dep bump doesn't need a
    # preview URL anyway.
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-placeholder' }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'ci-placeholder.appspot.com' }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '0' }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || 'ci-placeholder' }}
      VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      VITE_APPCHECK_SITE_KEY: ${{ secrets.VITE_APPCHECK_SITE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint + tsc + tests + build + worker)
        run: npm run verify

      - name: Deploy to Cloudflare Pages
        if: github.actor != 'dependabot[bot]'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=math-swipe --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # Production only: fail the workflow if the live site isn't serving
      # the build we just uploaded, or any hashed asset comes back missing
      # or as text/html (the 2026-07-21 cache-poison outage mode).
      - name: Post-deploy smoke check (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: bash scripts/smoke-prod.sh https://mathchallenge.app

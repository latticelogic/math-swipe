name: Firestore Rules Tests

# Runs the emulator-backed security-rules suite. Kept separate from the deploy
# workflow so a rules regression blocks the PR without touching the deploy path.
on:
  pull_request:
    paths:
      - 'firestore.rules'
      - 'firestore-tests/**'
      - 'firebase.json'
      - 'vitest.rules.config.ts'
      - 'package.json'
  workflow_dispatch:

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      # The Firestore emulator is a Java process. firebase-tools requires
      # JDK 21+ since mid-2026 (the workflow failed on 17).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci
      - run: npm install -g firebase-tools
      - run: npm run test:rules

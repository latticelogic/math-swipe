# Builds the Google Play package (.aab) for Math Challenge — the PWA at
# mathchallenge.app wrapped in a Trusted Web Activity via Bubblewrap.
#
# Runs in CI on purpose: ubuntu runners ship the JDK + Android SDK, while the
# dev machine (win-arm64) can't run the Android toolchain reliably.
#
# Two modes, keyed on whether the ANDROID_KEYSTORE_B64 secret exists:
#
#   BOOTSTRAP (first run, no secret): generates an upload keystore with a
#     random password, uploads it as a workflow artifact, and prints setup
#     instructions + the SHA-256 fingerprint in the run summary. Download the
#     artifact, then save the three secrets it tells you to. Delete the
#     artifact afterwards.
#
#   BUILD (secrets present): decodes the keystore, builds the signed .aab
#     (+ .apk for local device testing), uploads them as artifacts, and prints
#     the assetlinks.json fingerprint block in the run summary.
#
# Required secrets for BUILD mode:
#   ANDROID_KEYSTORE_B64       — base64 of the upload keystore
#   ANDROID_KEYSTORE_PASSWORD  — keystore password
#   ANDROID_KEY_PASSWORD       — key password (alias "android")

name: android-build

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: "Android versionCode (integer, must increase every Play upload)"
        required: false
        default: ""
      versionName:
        description: "Human-readable version, e.g. 1.0.0"
        required: false
        default: ""

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Keyless publish to Play via Workload Identity Federation — the org blocks
    # exported SA keys (constraints/iam.disableServiceAccountKeyCreation), and
    # WIF is the better practice regardless. `id-token: write` lets the runner
    # mint the GitHub OIDC token the auth step exchanges for GCP creds. HAS_WIF
    # gates the upload so the build still succeeds (artifact + notice) before
    # the WIF repo variables are configured.
    permissions:
      contents: read
      id-token: write
    env:
      HAS_WIF: ${{ vars.PLAY_WIF_PROVIDER != '' }}
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Detect mode
        id: mode
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "mode=bootstrap" >> "$GITHUB_OUTPUT"
          else
            echo "mode=build" >> "$GITHUB_OUTPUT"
          fi

      # ── BOOTSTRAP: generate the upload keystore once ─────────────────────
      - name: Generate upload keystore (bootstrap)
        if: steps.mode.outputs.mode == 'bootstrap'
        run: |
          PASS="$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-24)"
          keytool -genkeypair -v \
            -keystore android.keystore -alias android \
            -keyalg RSA -keysize 4096 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=Lattice Logic Pte. Ltd., OU=Math Challenge, O=Lattice Logic, C=SG"
          echo "$PASS" > keystore-password.txt
          keytool -list -v -keystore android.keystore -alias android -storepass "$PASS" \
            | grep "SHA256:" | sed 's/^\s*//' > upload-key-fingerprint.txt
          {
            echo "## Upload keystore generated (BOOTSTRAP mode)"
            echo ""
            echo "1. Download the **upload-keystore** artifact from this run."
            echo "2. Save these repo secrets:"
            echo '   - `ANDROID_KEYSTORE_B64` = `base64 -w0 android.keystore`'
            echo '   - `ANDROID_KEYSTORE_PASSWORD` = contents of keystore-password.txt'
            echo '   - `ANDROID_KEY_PASSWORD` = same value'
            echo "3. Store the keystore + password in the company password manager."
            echo "4. DELETE the artifact from this run, then re-run the workflow to build."
            echo ""
            echo "Upload key fingerprint (for assetlinks.json until Play App Signing takes over):"
            echo '```'
            cat upload-key-fingerprint.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload keystore artifact (bootstrap)
        if: steps.mode.outputs.mode == 'bootstrap'
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: |
            android/android.keystore
            android/keystore-password.txt
            android/upload-key-fingerprint.txt
          retention-days: 3

      # ── BUILD: decode keystore and produce the signed bundle ─────────────
      - name: Decode keystore
        if: steps.mode.outputs.mode == 'build'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android.keystore

      - name: Set version (monotonic versionCode from run number)
        if: steps.mode.outputs.mode == 'build'
        env:
          IN_VC: ${{ github.event.inputs.versionCode }}
          IN_VN: ${{ github.event.inputs.versionName }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Play requires a STRICTLY-INCREASING versionCode per upload. Bubblewrap
          # auto-increments at build time but CI never persists that back, so a
          # committed constant rebuilds the SAME versionCode every run and
          # collides after the first upload. Derive it from the monotonic
          # workflow run_number instead (offset well above any hand-set value):
          # unique + always-increasing, zero manual bumping. Explicit dispatch
          # input still wins for a one-off. Inputs are read from env (not
          # interpolated into the script) to avoid shell/JS injection.
          VC="${IN_VC:-$((1000 + RUN_NUMBER))}"
          VC="$VC" node -e "const f='twa-manifest.json',m=require('./'+f);m.appVersionCode=parseInt(process.env.VC,10);require('fs').writeFileSync(f,JSON.stringify(m,null,2)+'\n')"
          echo "appVersionCode set to $VC (Bubblewrap may +1 at build; still monotonic & unique)"
          if [ -n "$IN_VN" ]; then
            node -e "const f='twa-manifest.json',m=require('./'+f);m.appVersionName=process.env.IN_VN;require('fs').writeFileSync(f,JSON.stringify(m,null,2)+'\n')"
          fi

      - name: Build .aab + .apk with Bubblewrap
        if: steps.mode.outputs.mode == 'build'
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Bubblewrap is interactive-only: its prompt lib needs a real TTY and
          # discards buffered pipe input between prompts (piping "yes" either
          # EOF'd mid-install → exit 130, or flooded the log until truncation).
          # `expect` gives it a pseudo-TTY and answers each prompt precisely.
          sudo apt-get update -qq && sudo apt-get install -y -qq expect
          npm install -g @bubblewrap/cli
          # `update` first: lets Bubblewrap install and manage its own JDK +
          # Android SDK (avoids runner-SDK version/license drift), accepts the
          # SDK terms, and syncs the project from twa-manifest.json (writes the
          # manifest checksum). Answer "yes" to every setup prompt. (An earlier
          # "use your own JDK" variant hung: answering No opens a "Path to your
          # existing JDK" prompt, and expect's exp_continue re-fired the prior
          # match and typed stray answers into it → 45-min timeout. Yes-to-all
          # is the known-good path that previously reached Gradle.) The whole
          # update is retried up to 3x to ride out the one flaky SDK download.
          # `expect_before` clears the accumulated buffer after each match so a
          # prior prompt's text can't re-trigger its handler.
          run_update() {
            expect <<'EXP'
          set timeout 600
          spawn bubblewrap update
          # Every setup prompt ends in "(Y/n)" or "(y/N)" and we want "yes" for
          # all of them (install JDK, install SDK, accept terms). Match only the
          # prompt suffix and answer y; expect advances past each match so a
          # prompt can't re-fire. After setup, update proceeds with no prompts.
          expect {
            -re {\(Y/n\)|\(y/N\)} { send -- "y\r"; exp_continue }
            timeout { puts "\n[expect] timed out waiting for a bubblewrap prompt"; exit 1 }
            eof
          }
          catch wait result
          exit [lindex $result 3]
          EXP
          }
          for attempt in 1 2 3; do
            echo "=== bubblewrap update attempt $attempt ==="
            if run_update; then break; fi
            if [ "$attempt" = 3 ]; then echo "update failed after 3 attempts"; exit 1; fi
            sleep 20
          done
          # Gradle refuses to run when two SDK env vars point at different SDKs:
          # bubblewrap installed its own at $ANDROID_HOME while the runner still
          # exports ANDROID_SDK_ROOT=/usr/local/lib/android/sdk. Bubblewrap
          # drives Gradle via ANDROID_HOME (its own SDK), so drop the runner's
          # conflicting ANDROID_SDK_ROOT.
          unset ANDROID_SDK_ROOT

          # The committed project targets build-tools;35 + platforms;android-36,
          # but bubblewrap's freshly-installed SDK lacks them and their licenses.
          # Accept all licenses in bubblewrap's SDK and install what Gradle needs
          # so the build doesn't fail on "licences have not been accepted".
          BW_SDK="$HOME/.bubblewrap/android_sdk"
          SDKMGR="$(find "$BW_SDK" -name sdkmanager -type f 2>/dev/null | head -1)"
          if [ -n "$SDKMGR" ]; then
            yes | "$SDKMGR" --sdk_root="$BW_SDK" --licenses >/dev/null 2>&1 || true
            "$SDKMGR" --sdk_root="$BW_SDK" \
              "platform-tools" "build-tools;35.0.0" "platforms;android-36" >/dev/null 2>&1 || true
          fi

          # Google Play requires targetSdk 36 (Android 16) for app updates from
          # Aug 31 2026. Bubblewrap v1.24.1's app template still hardcodes
          # `targetSdkVersion 35` (compileSdkVersion is already 36, and we
          # installed platforms;android-36 above), so force 36 in the freshly
          # generated project. Fail loudly if the value we expected to replace
          # isn't there — a future Bubblewrap template bump that changes this
          # line must not silently ship a non-compliant target.
          test -f app/build.gradle || { echo "app/build.gradle missing after bubblewrap update"; exit 1; }
          sed -i -E 's/targetSdkVersion[[:space:]]+[0-9]+/targetSdkVersion 36/' app/build.gradle
          grep -qE 'targetSdkVersion[[:space:]]+36' app/build.gradle \
            || { echo "ERROR: targetSdkVersion 36 not set in app/build.gradle"; grep -n 'targetSdk' app/build.gradle || true; exit 1; }
          echo "targetSdkVersion forced to 36 (Play Aug-31-2026 requirement) ✓"

          # Toolchain + checksum now present, so `build` has no prompts. EOF
          # guards against any surprise prompt hanging the runner.
          bubblewrap build --skipPwaValidation < /dev/null

      - name: Print assetlinks fingerprint block
        if: steps.mode.outputs.mode == 'build'
        env:
          STOREPASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          FP=$(keytool -list -v -keystore android.keystore -alias android -storepass "$STOREPASS" \
            | grep "SHA256:" | head -1 | sed 's/.*SHA256: //')
          {
            echo "## Build complete"
            echo ""
            echo "Artifacts: \`app-release-bundle.aab\` (upload to Play Console) + \`app-release-signed.apk\` (sideload testing)."
            echo ""
            echo "**Upload-key** SHA-256 (second entry in public/.well-known/assetlinks.json):"
            echo '```'
            echo "$FP"
            echo '```'
            echo ""
            echo "After the first Play upload, ALSO copy the **Play App Signing** SHA-256 from"
            echo "Play Console → Test and release → Setup → App integrity into assetlinks.json"
            echo "(first entry) — Play re-signs the app, so that key is what devices actually see."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        if: steps.mode.outputs.mode == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: math-challenge-android
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
          retention-days: 14

      # Publish straight to the Play *internal* track via the Play Developer
      # API — no manual Console upload, and NO exported key (keyless WIF).
      # Deliberately internal, never production: internal -> production stays
      # an owner decision. The play-publisher SA must also be a Play Console
      # user with "Release to testing tracks". The first bundle for a package
      # must be uploaded once via the Console before the API accepts uploads;
      # versionCode 1 already satisfies that. auth action SHA-pinned (v3).
      - name: Authenticate to Google Cloud (keyless, WIF)
        if: steps.mode.outputs.mode == 'build' && env.HAS_WIF == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.PLAY_WIF_PROVIDER }}
          service_account: ${{ vars.PLAY_PUBLISHER_SA }}

      - name: Publish .aab to Play internal track
        if: steps.mode.outputs.mode == 'build' && env.HAS_WIF == 'true'
        env:
          PACKAGE: app.mathchallenge.twa
        run: |
          pip install --quiet google-api-python-client google-auth
          python - <<'PY'
          import os
          import google.auth
          from googleapiclient.discovery import build
          pkg = os.environ['PACKAGE']
          # ADC comes from the WIF auth step (external_account creds file).
          creds, _ = google.auth.default(
              scopes=['https://www.googleapis.com/auth/androidpublisher'])
          svc = build('androidpublisher', 'v3', credentials=creds,
                      cache_discovery=False)
          edit = svc.edits().insert(packageName=pkg, body={}).execute()
          eid = edit['id']
          up = svc.edits().bundles().upload(
              packageName=pkg, editId=eid,
              media_body='app-release-bundle.aab',
              media_mime_type='application/octet-stream').execute()
          vc = up['versionCode']
          print(f'uploaded versionCode {vc}')
          svc.edits().tracks().update(
              packageName=pkg, editId=eid, track='internal',
              body={'releases': [{'versionCodes': [vc],
                                  'status': 'completed'}]}).execute()
          svc.edits().commit(packageName=pkg, editId=eid).execute()
          print(f'committed versionCode {vc} to the internal track')
          PY

      - name: Note when Play upload is skipped
        if: steps.mode.outputs.mode == 'build' && env.HAS_WIF != 'true'
        run: |
          echo "::notice::WIF not configured (repo var PLAY_WIF_PROVIDER empty) — .aab built and stored as an artifact but NOT auto-uploaded to Play. See docs/google-play-launch.md §A1b."

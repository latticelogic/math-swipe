<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Math Challenge — Mental Math Game</title>
  <meta name="description"
    content="Math Challenge is a fast, fun mental math game — practice times tables, addition, subtraction, and arithmetic tricks by swiping. Play the free daily challenge, build a streak, and race your friends." />
  <link rel="canonical" href="https://mathchallenge.app/" />
  <meta name="robots" content="index, follow" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1b1b1b" id="meta-theme-color" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <!-- iOS ignores SVG apple-touch-icons — a real 180×180 PNG is required for a
       crisp home-screen icon on "Add to Home Screen" (and the future iOS shell). -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Math Challenge" />

  <!-- Open Graph (social sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Math Challenge" />
  <meta property="og:url" content="https://mathchallenge.app/" />
  <meta property="og:title" content="Math Challenge — Mental Math Game" />
  <meta property="og:description"
    content="A fast, fun mental math game. Practice times tables, addition, and arithmetic tricks by swiping — play the free daily challenge and race your friends." />
  <meta property="og:image" content="https://mathchallenge.app/icon-512.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Math Challenge — Mental Math Game" />
  <meta name="twitter:description"
    content="A fast, fun mental math game. Practice times tables, addition, and arithmetic tricks by swiping — play the free daily challenge and race your friends." />
  <meta name="twitter:image" content="https://mathchallenge.app/icon-512.png" />

  <!-- Fonts (self-hosted from /public/fonts; see @font-face in src/index.css).
       Pre-loading the latin subset (the one we actually use for English UI)
       removes the first-paint serif fallback flash. Latin-ext loads lazily
       via @font-face for any extended-Latin characters that may appear. -->
  <link rel="preload" as="font" type="font/woff2" crossorigin
    href="/fonts/architects-daughter.latin.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin
    href="/fonts/fredericka-the-great.latin.woff2">

  <!-- Structured data — helps search engines classify this as a game/app.
       type=application/ld+json is a data block (not executed), so the strict
       script CSP doesn't apply. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Math Challenge",
    "url": "https://mathchallenge.app/",
    "description": "A fast, fun mental math game — practice times tables, addition, subtraction, and arithmetic tricks by swiping. Play the free daily challenge, build a streak, and race your friends.",
    "applicationCategory": "GameApplication",
    "applicationSubCategory": "EducationalApplication",
    "operatingSystem": "Web, iOS, Android",
    "browserRequirements": "Requires JavaScript.",
    "inLanguage": ["en", "es", "pt-BR", "fr", "de", "it", "id", "ko", "zh-Hans", "zh-Hant", "ja", "hi"],
    "audience": {
      "@type": "EducationalAudience",
      "educationalRole": "student",
      "audienceType": "children ages 8-14 and adults"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Lattice Logic Pte. Ltd.",
      "url": "https://mathchallenge.app/"
    },
    "offers": {
      "@type": "Offer",
      "price": "3.14",
      "priceCurrency": "USD",
      "description": "One-time lifetime unlock after a free 7-day trial. The Daily Challenge is free forever. No subscription."
    }
  }
  </script>

  <!-- Pre-hydration boot splash: a branded chalkboard screen shown until React
       mounts, so there's no white flash on first load (web + installed PWA).
       React replaces #root's children on render, removing it. Inline styles are
       allowed by the CSP (style-src 'unsafe-inline'); scripts are not, so this
       is pure CSS. -->
  <style>
    #boot-splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #1b1b1b; }
    #boot-splash img { width: 76px; height: 76px; animation: boot-pulse 1.4s ease-in-out infinite; }
    @keyframes boot-pulse { 0%, 100% { opacity: .4; transform: scale(.96); } 50% { opacity: 1; transform: scale(1); } }
    @media (prefers-reduced-motion: reduce) { #boot-splash img { animation: none; opacity: .85; } }
  </style>
</head>

<body>
  <!-- Prevent flash of wrong theme on load + set correct PWA theme-color.
       External file (not inline) so a strict CSP without 'unsafe-inline' for scripts can ship. -->
  <script src="/theme-bootstrap.js"></script>
  <div id="root">
    <div id="boot-splash"><img src="/icon.svg" alt="" /></div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
